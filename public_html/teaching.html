<style>
:root {
  --theme-bg: #050505;
  --theme-panel: #0b0b0b;
  --theme-ink: #f3efe4;
  --theme-muted: #b7af9d;
  --theme-line: rgba(243, 239, 228, 0.72);
  --theme-accent: #c45a8d;
}
html {
  scroll-behavior: smooth;
  background:
    radial-gradient(circle at top right, rgba(240,160,32,0.12), transparent 22%),
    radial-gradient(circle at left 18%, rgba(107,180,255,0.06), transparent 18%),
    linear-gradient(180deg, #030303 0%, #090909 100%);
}
body {
  width: min(100% - 20px, 1020px);
  margin: 0 auto;
  padding: 18px 20px 28px !important;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.02), transparent 16%),
    linear-gradient(90deg, rgba(107,180,255,0.035), transparent 18%, transparent 82%, rgba(240,160,32,0.05)),
    var(--theme-panel) !important;
  color: var(--theme-ink) !important;
  border: 3px solid var(--theme-ink);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.06), 0 24px 70px rgba(0,0,0,0.46);
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: linear-gradient(rgba(255,255,255,0.02) 50%, transparent 50%);
  background-size: 100% 4px;
  opacity: 0.14;
  mix-blend-mode: screen;
  z-index: 0;
}
body > * { position: relative; z-index: 1; }
a {
  display: inline-block;
  padding: 0 2px;
  color: var(--theme-ink) !important;
  text-decoration: none !important;
  background: linear-gradient(90deg, var(--theme-accent), var(--theme-accent)) left center / 0% 100% no-repeat;
  border-bottom: 1px solid transparent;
  transition: background-size 0.28s ease, color 0.28s ease, border-color 0.28s ease, box-shadow 0.28s ease, transform 0.18s ease;
}
a:hover,
a:focus {
  background-size: 100% 100%;
  color: #111 !important;
  border-bottom-color: var(--theme-accent);
  box-shadow: 3px 3px 0 rgba(240,160,32,0.22);
}
a:active { transform: translateY(1px); }
h1, h2 {
  color: var(--theme-accent);
  margin-top: 0;
  font-family: 'Departure Mono', monospace;
}
h1 {
  font-size: 36px !important;
  margin-bottom: 14px;
}
h2 {
  font-size: 24px !important;
  border-bottom: 2px solid var(--theme-line);
  padding-bottom: 4px;
  box-shadow: inset 0 -1px 0 rgba(107,180,255,0.18);
  margin-bottom: 16px;
}
header, main, footer, section, ul, p {
  position: relative;
  z-index: 1;
}
ul {
  list-style: none;
  padding-left: 0;
}
li {
  margin: 12px 0;
}
main section,
header,
footer,
body > ul,
body > p {
  background: rgba(255,255,255,0.012);
  border: 1px solid rgba(255,255,255,0.10);
  padding: 14px 16px;
  margin-bottom: 14px;
}
small { color: var(--theme-muted); }
@media (max-width: 900px) {
  body {
    width: calc(100% - 20px);
    padding: 12px !important;
  }
}
</style>

<!-- sakura-cursor-start -->
<style>
  @media (pointer: fine) {
    body {
      cursor: url("sakura-cursor.png") 6 6, auto !important;
    }

    body a,
    body button,
    body input[type="button"],
    body input[type="submit"],
    body input[type="reset"],
    body select,
    body summary,
    body [role="button"] {
      cursor: url("sakura-cursor-2.png") 6 6, pointer !important;
    }
  }

  .sakura-layer {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 998;
    opacity: 0;
    transition: opacity 240ms ease;
  }

  body.sakura-screensaver-on .sakura-layer {
    opacity: 1;
  }

  .screensaver-sakura {
    position: absolute;
    top: -120px;
    left: 0;
    width: 96px;
    height: 96px;
    background-image: url("sakura_.png");
    background-position: center;
    background-repeat: no-repeat;
    background-size: contain;
    opacity: 0;
    animation: screensaver-sakura-fall linear infinite;
    animation-duration: var(--fall-duration, 18s);
    animation-delay: var(--fall-delay, 0s);
    transform: translate3d(0, -12vh, 0) rotate(0deg) scale(var(--fall-scale, 1));
    will-change: transform, opacity;
  }

  .trail-sakura,
  .click-sakura {
    position: fixed;
    pointer-events: none;
    z-index: 1002;
    background-position: center;
    background-repeat: no-repeat;
    background-size: contain;
    transform: translate(-50%, -50%);
    will-change: transform, opacity;
  }

  .trail-sakura {
    width: 42px;
    height: 42px;
    background-image: url("sakura.png");
    opacity: 0.58;
    animation: trail-sakura-fade 520ms linear forwards;
  }

  .click-sakura {
    width: 96px;
    height: 96px;
    background-image: url("sakura_1.png");
    opacity: 0.95;
    animation: click-sakura-pop 420ms ease-out forwards;
  }

  @keyframes click-sakura-pop {
    0% {
      transform: translate(-50%, -50%) scale(0.82) rotate(0deg);
      opacity: 0.95;
    }
    100% {
      transform: translate(-50%, -85%) scale(1.14) rotate(14deg);
      opacity: 0;
    }
  }

  @keyframes trail-sakura-fade {
    0% {
      transform: translate(-50%, -50%) scale(0.72) rotate(0deg);
      opacity: 0.62;
    }
    100% {
      transform: translate(-50%, -50%) translate3d(var(--trail-drift-x, 0px), var(--trail-drift-y, 0px), 0) scale(1.02) rotate(var(--trail-rotate, 12deg));
      opacity: 0;
    }
  }

  @keyframes screensaver-sakura-fall {
    0% {
      transform: translate3d(var(--x-shift, 0px), -12vh, 0) rotate(0deg) scale(var(--fall-scale, 1));
      opacity: 0;
    }
    8% {
      opacity: 0.85;
    }
    100% {
      transform: translate3d(calc(var(--x-shift, 0px) + var(--drift, 40px)), 112vh, 0) rotate(220deg) scale(var(--fall-scale, 1));
      opacity: 0.15;
    }
  }
</style>
<script>
  function ensureSakuraScreensaver() {
    var layer = document.getElementById("sakura-layer");
    if (!layer || layer.childElementCount) return;

    for (var i = 0; i < 14; i++) {
      var bloom = document.createElement("span");
      bloom.className = "screensaver-sakura";
      bloom.style.left = Math.random() * 100 + "vw";
      bloom.style.setProperty("--fall-duration", 14 + Math.random() * 10 + "s");
      bloom.style.setProperty("--fall-delay", (-1 * Math.random() * 18) + "s");
      bloom.style.setProperty("--fall-scale", (0.75 + Math.random() * 0.55).toFixed(2));
      bloom.style.setProperty("--x-shift", (Math.random() * 80 - 40) + "px");
      bloom.style.setProperty("--drift", (Math.random() * 140 - 70) + "px");
      layer.appendChild(bloom);
    }
  }

  var sakuraScreensaverTimer;
  var lastTrailTime = 0;
  function disableSakuraScreensaver() {
    document.body.classList.remove("sakura-screensaver-on");
  }

  function scheduleSakuraScreensaver() {
    disableSakuraScreensaver();
    window.clearTimeout(sakuraScreensaverTimer);
    sakuraScreensaverTimer = window.setTimeout(function () {
      ensureSakuraScreensaver();
      document.body.classList.add("sakura-screensaver-on");
    }, 60000);
  }

  function spawnTrailSakura(x, y) {
    var trail = document.createElement("span");
    trail.className = "trail-sakura";
    trail.style.left = x + "px";
    trail.style.top = y + "px";
    trail.style.setProperty("--trail-drift-x", (Math.random() * 24 - 12) + "px");
    trail.style.setProperty("--trail-drift-y", (Math.random() * 18 - 14) + "px");
    trail.style.setProperty("--trail-rotate", (Math.random() * 40 - 20) + "deg");
    document.body.appendChild(trail);
    window.setTimeout(function () {
      trail.remove();
    }, 540);
  }

  function maybeSpawnTrailSakura(event) {
    var now = Date.now();
    if (now - lastTrailTime < 70) return;
    lastTrailTime = now;

    spawnTrailSakura(event.clientX - 10, event.clientY - 6);
    if (Math.random() > 0.55) {
      spawnTrailSakura(event.clientX + 8, event.clientY + 6);
    }
  }

  function spawnClickSakura(x, y) {
    var burstOffsets = [
      { x: -26, y: -10, rotate: -18, scale: 0.82 },
      { x: 0, y: -22, rotate: 8, scale: 0.96 },
      { x: 24, y: -4, rotate: 18, scale: 0.86 }
    ];

    burstOffsets.forEach(function (offset, index) {
      var petal = document.createElement("span");
      petal.className = "click-sakura";
      petal.style.left = (x + offset.x) + "px";
      petal.style.top = (y + offset.y) + "px";
      petal.style.transform = "translate(-50%, -50%) scale(" + offset.scale + ") rotate(" + offset.rotate + "deg)";
      document.body.appendChild(petal);
      window.setTimeout(function () {
        petal.remove();
      }, 450 + index * 20);
    });
  }

  function initSakuraCursor() {
    if (document.body.dataset.sakuraCursorInit === "1") return;
    document.body.dataset.sakuraCursorInit = "1";
    document.querySelectorAll("a, button, input, textarea, select, [role='button']").forEach(function (el) {
      el.addEventListener("mousedown", function (event) {
        spawnClickSakura(event.clientX, event.clientY);
      });
    });
    window.addEventListener("mousemove", function (event) {
      maybeSpawnTrailSakura(event);
      scheduleSakuraScreensaver();
    }, { passive: true });
    window.addEventListener("mousedown", function () {
      scheduleSakuraScreensaver();
    }, { passive: true });
    window.addEventListener("keydown", function () {
      scheduleSakuraScreensaver();
    });
    scheduleSakuraScreensaver();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initSakuraCursor);
  } else {
    initSakuraCursor();
  }
</script>
<!-- sakura-cursor-end -->
</body>
